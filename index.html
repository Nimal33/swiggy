<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="home">

    <div class="container">
        <h2 style="color:white;">Foodie</h2>

        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">Order</a>
            <a href="#">Groceries</a>
            <a href="#">Contact</a>
        </nav>

        <div>
            <button class="btn1">Login</button>
            <button class="btn2">Sign Up</button>
        </div>
    </div>

    <h1>Discover The Best Food & Drinks</h1>

    <div class="container2">
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search food...">
            <button class="search-button">🔍</button>
        </div>

        <div class="location-container">
            <input type="text" class="location-bar" placeholder="Enter location">
            <button class="location-button">📍</button>
        </div>
    </div>

</header>


<!-- ================= ORDER FOOD ================= -->
<section>
    <div class="order-food">
        <img src="https://source.unsplash.com/300x300/?pizza">
        <img src="https://source.unsplash.com/300x300/?burger">
        <img src="https://source.unsplash.com/300x300/?biryani">
        <img src="https://source.unsplash.com/300x300/?pasta">
        <img src="https://source.unsplash.com/300x300/?dessert">
    </div>
</section>


<!-- ================= GROCERIES ================= -->
<section>
    <div class="groceries">

        <div class="item">
            <img src="https://source.unsplash.com/200x300/?vegetables">
            <p>Vegetables</p>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/200x300/?fruits">
            <p>Fruits</p>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/200x300/?milk">
            <p>Dairy</p>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/200x300/?groceries">
            <p>More</p>
        </div>

    </div>
</section>


<!-- ================= HOTEL SECTION ================= -->
<section>

    <div class="hotel">

        <div class="items">
            <img src="https://source.unsplash.com/400x300/?restaurant">
            <h4>Spicy Treat</h4>
            <h6>4.5 ★</h6>
            <br>
            <button class="button01">Order Now</button>
        </div>

        <div class="items">
            <img src="https://source.unsplash.com/400x300/?indian-food">
            <h4>Royal Biryani</h4>
            <h6>4.2 ★</h6>
            <br>
            <button class="button02">Order Now</button>
        </div>

        <div class="items">
            <img src="https://source.unsplash.com/400x300/?fast-food">
            <h4>Fast Feast</h4>
            <h6>4.7 ★</h6>
            <br>
            <button class="button01">Order Now</button>
        </div>

    </div>

</section>


<!-- ================= CITY GRID ================= -->
<section>
    <div class="citybtn">
        <button class="button1">Chennai</button>
        <button class="button1">Trichy</button>
        <button class="button1">Madurai</button>
        <button class="button1">Coimbatore</button>
        <button class="button1">Salem</button>
        <button class="button1">Erode</button>
        <button class="button1">Tirunelveli</button>
        <button class="button1">Vellore</button>
    </div>
</section>


<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Foodie. All Rights Reserved.</p>
</footer>

</body>
</html>
